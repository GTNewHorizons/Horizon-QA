# Horizon-QA documentation
site_name: Horizon-QA
site_description: End-to-end GameTest framework for GT New Horizons. Write, run, and debug multiblock tests on Minecraft 1.7.10.
site_author: GTNewHorizons
site_url: https://www.gtnewhorizons.com/Horizon-QA/
repo_url: https://github.com/GTNewHorizons/Horizon-QA
repo_name: GTNewHorizons/Horizon-QA
edit_uri: edit/master/docs/

copyright: Copyright &copy; GTNewHorizons. Released under the <a href="https://github.com/GTNewHorizons/Horizon-QA/blob/master/LICENSE">MIT License</a>.

theme:
  name: material
  language: en
  logo: assets/horizon-qa-flask-navbar.svg
  favicon: assets/favicon.svg
  font: false
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  features:
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/GTNewHorizons/Horizon-QA
      name: Horizon-QA on GitHub
    - icon: fontawesome/solid/book
      link: https://www.gtnewhorizons.com/Horizon-QA/javadoc/
      name: Horizon-QA Javadoc
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: GTNewHorizons
      repo: Horizon-QA
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
      base_path:
        - .
        - docs
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      lang: en
      separator: '[\s\-]+'
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Get started:
    - getting-started/index.md
    - Add Horizon-QA to your mod: getting-started/mod-setup.md
    - Write your first test: getting-started/first-test.md
    - Run tests: getting-started/enable-and-run.md
    - Explore runnable examples: contributing/examples-mod.md
  - Learn:
    - concepts/index.md
    - Runtime lifecycle: concepts/runtime-lifecycle.md
    - Execution model: concepts/execution-model.md
    - Fixtures, coordinates, and isolation: concepts/fixtures-and-isolation.md
    - Design principles: contributing/principles.md
  - Guides:
    - guide/index.md
    - Author tests:
      - Writing tests: guide/writing-tests.md
      - Structure templates: guide/structures.md
      - GTNH multiblock testing: guide/gtnh-api.md
      - Negative assertions: guide/negative-tests.md
      - Sequences and timing: guide/sequences.md
    - Run and diagnose:
      - CI and JUnit reports: guide/ci.md
      - Setup troubleshooting: guide/troubleshooting.md
      - Debugging failed tests: guide/debugging.md
  - Reference:
    - reference/index.md
    - Author API:
      - Core helper API: reference/helper-api.md
      - Annotations: reference/annotations.md
    - Runtime and output:
      - Commands: reference/commands.md
      - JVM properties: reference/jvm-flags.md
      - Test event log: reference/events.md
    - Conventions:
      - Package layout: reference/package-layout.md
      - Versioning: reference/versioning.md
  - Project:
    - Contributing: contributing/index.md
    - Clean-room policy: contributing/legal.md
  - Javadoc API: https://www.gtnewhorizons.com/Horizon-QA/javadoc/index.html

strict: true

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

exclude_docs: |
  includes/*
